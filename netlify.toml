# ClipForge — Netlify deployment config
#
# KEY ARCHITECTURE:
#   /index.html   → landing page + ads (NO isolation headers)
#   /editor.html  → ffmpeg.wasm editor (COOP/COEP isolated)
#
# Ad scripts (Adsterra, AdSense) work on index.html because
# it has no COOP/COEP. ffmpeg.wasm works in editor.html
# because it has full cross-origin isolation.

# Default headers for ALL pages — safe, no isolation
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# COOP/COEP only for the editor page and its assets
[[headers]]
  for = "/editor.html"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
  for = "/js/app.js"
  [headers.values]
    Cross-Origin-Embedder-Policy = "require-corp"

[[redirects]]
  from = "/editor"
  to = "/editor.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/pages/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/pages/privacy.html"
  status = 200

[[redirects]]
  from = "/sitemap"
  to = "/pages/sitemap.html"
  status = 200
